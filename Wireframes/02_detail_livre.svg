<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial">
  <rect x="0" y="0" width="800" height="600" fill="white" stroke="#999" stroke-width="2"/>
  <rect x="15" y="15" width="770" height="50" fill="#EBF5F8" stroke="#0066993A" stroke-dasharray="4"/>
  <text x="400" y="45" text-anchor="middle" font-size="14" fill="#555">Header</text>

  <text x="30" y="100" font-size="20" font-weight="bold" fill="#333">Titre du livre</text>
  <text x="30" y="130" font-size="14" fill="#555">Auteur(s) -- Categorie -- Annee de publication</text>

  <rect x="25" y="160" width="750" height="150" fill="#EBF5F8" stroke="#0066993A" stroke-dasharray="4"/>
  <text x="400" y="240" text-anchor="middle" font-size="14" fill="#555">Liste des exemplaires : etat / disponibilite</text>

  <rect x="120" y="340" width="140" height="40" rx="8" fill="#0096881F" stroke="#009688" stroke-width="1.5"/>
  <text x="190" y="365" text-anchor="middle" font-size="13">Emprunter</text>

  <rect x="330" y="340" width="140" height="40" rx="8" fill="white" stroke="#009688" stroke-width="1.5"/>
  <text x="400" y="365" text-anchor="middle" font-size="13">Modifier</text>

  <rect x="540" y="340" width="140" height="40" rx="8" fill="white" stroke="#009688" stroke-width="1.5"/>
  <text x="610" y="365" text-anchor="middle" font-size="13">Supprimer</text>

  <rect x="25" y="410" width="750" height="120" fill="#EBF5F8" stroke="#0066993A" stroke-dasharray="4"/>
  <text x="400" y="475" text-anchor="middle" font-size="14" fill="#555">Historique des derniers emprunts de ce livre</text>

  <rect x="15" y="550" width="770" height="35" fill="#EBF5F8" stroke="#0066993A" stroke-dasharray="4"/>
  <text x="400" y="572" text-anchor="middle" font-size="11" fill="#777">Footer</text>
</svg>
